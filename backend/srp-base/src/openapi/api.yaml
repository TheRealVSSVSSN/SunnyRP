openapi: 3.0.3
info:
  title: SunnyRP Base API
  version: 0.1.0
  description: |
    This API powers the SunnyRP backend.  All persistence and
    authoritative state resides behind these routes.  Consumers (e.g.
    FiveM Lua) must authenticate with X-API-Token on every call.
servers:
  - url: http://localhost:3010
components:
  securitySchemes:
    ApiToken:
      type: apiKey
      in: header
      name: X-API-Token
  # Schema definitions for reusable data objects.  These types can be
  # referenced elsewhere in the spec via $ref.  Adding contract here
  # enables clients to understand the structure of contract objects.
  schemas:
    Contract:
      type: object
      properties:
        id:
          type: integer
        sender_id:
          type: string
          description: Player ID of the contract creator
        receiver_id:
          type: string
          description: Player ID who must accept or decline the contract
        amount:
          type: integer
          description: Amount in whole cents
        info:
          type: string
          nullable: true
          description: Optional description of the contract
        paid:
          type: boolean
        accepted:
          type: boolean
          nullable: true
          description: null = pending, true = accepted, false = declined
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # Driving test record
    DrivingTest:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier of the driving test
        cid:
          type: string
          description: Player identifier of the test taker
        icid:
          type: string
          description: Player identifier of the instructor
        instructor:
          type: string
          description: Display name of the instructor
        timestamp:
          type: integer
          description: Epoch seconds when the test was recorded
        points:
          type: integer
          description: Numeric score of the test
        passed:
          type: boolean
          description: Whether the student passed the test
        results:
          type: object
          additionalProperties: true
          description: Arbitrary result details encoded as JSON
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # Drift school payment request
    DriftSchoolPayment:
      type: object
      required:
        - playerId
        - amount
      properties:
        playerId:
          type: string
          description: Identifier of the paying player
        amount:
          type: number
          description: Amount in whole cents to pay for drift school
security:
  - ApiToken: []
paths:
  /v1/healthz:
    get:
      summary: Liveness probe
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
  /v1/ready:
    get:
      summary: Readiness probe
      responses:
        '200':
          description: Service is ready
        '503':
          description: Dependencies unavailable
  /v1/config/live:
    get:
      summary: Retrieve live config
      responses:
        '200':
          description: Current configuration
    post:
      summary: Update live config
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                features:
                  type: object
                settings:
                  type: object
      responses:
        '200':
          description: Updated config
  /v1/users/exists:
    get:
      summary: Check if a user exists
      parameters:
        - in: query
          name: hex_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Existence result
  /v1/users:
    post:
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - hex_id
                - name
              properties:
                hex_id:
                  type: string
                name:
                  type: string
                identifiers:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      value:
                        type: string
      responses:
        '200':
          description: Created user
  /v1/users/{hex_id}:
    get:
      summary: Get a user
      parameters:
        - name: hex_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User object
        '404':
          description: Not found
  /v1/characters:
    get:
      summary: List characters for an owner
      parameters:
        - name: owner_hex
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of characters
    post:
      summary: Create a character
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - owner_hex
                - first_name
                - last_name
              properties:
                owner_hex:
                  type: string
                first_name:
                  type: string
                last_name:
                  type: string
      responses:
        '200':
          description: Created character
  /v1/characters/{id}:
    get:
      summary: Get a character by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Character object
        '404':
          description: Not found
    patch:
      summary: Update a character
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated character
  /v1/permissions/{playerId}:
    get:
      summary: List permissions for a player
      parameters:
        - name: playerId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of scopes
  /v1/permissions/grant:
    post:
      summary: Grant a permission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - playerId
                - scope
              properties:
                playerId:
                  type: string
                scope:
                  type: string
      responses:
        '200':
          description: Updated scopes
  /v1/permissions/revoke:
    post:
      summary: Revoke a permission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - playerId
                - scope
              properties:
                playerId:
                  type: string
                scope:
                  type: string
      responses:
        '200':
          description: Updated scopes
  /v1/players/link:
    post:
      summary: Link a player by identifiers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - identifiers
              properties:
                identifiers:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      value:
                        type: string
      responses:
        '200':
          description: Link result with user and scopes
  /v1/outbox/enqueue:
    post:
      summary: Enqueue an outbox event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - topic
                - payload
              properties:
                topic:
                  type: string
                payload:
                  type: object
      responses:
        '200':
          description: Created outbox event
  /v1/admin/ban:
    post:
      summary: Ban a player
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - playerId
                - reason
              properties:
                playerId:
                  type: string
                reason:
                  type: string
                until:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Player banned

  # Contracts API
  /v1/contracts:
    get:
      summary: List contracts for a player
      description: Returns all contracts where the specified player is either the sender or receiver.
      parameters:
        - in: query
          name: playerId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of contracts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Contract'
    post:
      summary: Create a new contract
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - senderId
                - receiverId
                - amount
              properties:
                senderId:
                  type: string
                receiverId:
                  type: string
                amount:
                  type: integer
                  description: Amount in whole cents
                info:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Contract created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer

  /v1/contracts/{id}/accept:
    post:
      summary: Accept a contract
      description: Accepts a pending contract, withdrawing funds from the receiver and depositing into the sender.  Requires the playerId of the receiver in the body.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - playerId
              properties:
                playerId:
                  type: string
      responses:
        '200':
          description: Contract accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer

  /v1/contracts/{id}/decline:
    post:
      summary: Decline a contract
      description: Declines a pending contract without transferring funds.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Contract declined

  # Driving tests API
  /v1/driving-tests:
    get:
      summary: List recent driving tests for a player
      parameters:
        - in: query
          name: cid
          required: true
          schema:
            type: string
          description: Player identifier to fetch tests for
      responses:
        '200':
          description: List of driving tests
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      tests:
                        type: array
                        items:
                          $ref: '#/components/schemas/DrivingTest'
    post:
      summary: Record a new driving test result
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - cid
                - icid
                - points
                - passed
              properties:
                cid:
                  type: string
                icid:
                  type: string
                instructor:
                  type: string
                  nullable: true
                points:
                  type: number
                passed:
                  type: boolean
                results:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Driving test recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      test:
                        $ref: '#/components/schemas/DrivingTest'

  /v1/driving-tests/{id}:
    get:
      summary: Retrieve a driving test by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Driving test found
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      test:
                        $ref: '#/components/schemas/DrivingTest'
        '404':
          description: Test not found

  /v1/driftschool/pay:
    post:
      summary: Pay for drift school participation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriftSchoolPayment'
      responses:
        '200':
          description: Payment successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      success:
                        type: boolean
                      newBalance:
                        type: number
        '402':
          description: Insufficient funds
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
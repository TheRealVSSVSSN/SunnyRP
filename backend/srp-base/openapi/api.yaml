openapi: 3.0.3
info:
  title: SunnyRP Base API
  version: 0.1.0
  description: |
    This API powers the SunnyRP backend.  All persistence and
    authoritative state resides behind these routes.  Consumers (e.g.
    FiveM Lua) must authenticate with X-API-Token on every call.
servers:
  - url: http://localhost:3010
components:
  securitySchemes:
    ApiToken:
      type: apiKey
      in: header
      name: X-API-Token
  responses:
    BadRequest:
      description: Invalid input
      content:
        application/json:
          schema:
            type: object
            properties:
              ok:
                type: boolean
              error:
                type: object
                properties:
                  code:
                    type: string
                  message:
                    type: string
  schemas:
    MinimapBlip:
      type: object
      properties:
        id:
          type: integer
        x:
          type: number
        y:
          type: number
        z:
          type: number
        sprite:
          type: integer
        color:
          type: integer
        label:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
              requestId:
                type: string
              traceId:
                type: string
  # Schema definitions for reusable data objects.  These types can be
  # referenced elsewhere in the spec via $ref.  Adding contract here
  # enables clients to understand the structure of contract objects.
  schemas:
    RecyclingDelivery:
      type: object
      properties:
        id:
          type: integer
        characterId:
          type: integer
        materials:
          type: integer
        createdAt:
          type: string
          format: date-time
    RecyclingDeliveryCreateRequest:
      type: object
      required: [characterId, materials]
      properties:
        characterId:
          type: integer
        materials:
          type: integer
    DebugLog:
      type: object
      properties:
        id:
          type: integer
        level:
          type: string
        message:
          type: string
        context:
          type: object
          nullable: true
          additionalProperties: true
        accountId:
          type: string
          nullable: true
        characterId:
          type: integer
          nullable: true
        source:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    DebugLogCreateRequest:
      type: object
      required: [level, message]
      properties:
        level:
          type: string
          description: e.g. info, warn, error, trace
        message:
          type: string
        context:
          type: object
          additionalProperties: true
        accountId:
          type: string
        characterId:
          type: integer
        source:
          type: string
          description: client, server, resource name, etc.
    DebugMarker:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          description: e.g. text, line, marker, sphere
        data:
          type: object
          additionalProperties: true
        createdBy:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          nullable: true
    DebugMarkerCreateRequest:
      type: object
      required: [type]
      properties:
        type:
          type: string
        data:
          type: object
          additionalProperties: true
        ttlMs:
          type: integer
        createdBy:
          type: integer
    HackingAttempt:
      type: object
      properties:
        id:
          type: integer
        characterId:
          type: integer
        target:
          type: string
        success:
          type: boolean
        createdAt:
          type: string
          format: date-time
    HackingAttemptCreateRequest:
      type: object
      required: [characterId, target, success]
      properties:
        characterId:
          type: integer
        target:
          type: string
        success:
          type: boolean
    IplState:
      type: object
      properties:
        name:
          type: string
        enabled:
          type: boolean
        updatedAt:
          type: string
          format: date-time
    IplStateInput:
      type: object
      required:
        - name
        - enabled
      properties:
        name:
          type: string
        enabled:
          type: boolean
    Contract:
      type: object
      properties:
        id:
          type: integer
        sender_id:
          type: string
          description: Player ID of the contract creator
        receiver_id:
          type: string
          description: Player ID who must accept or decline the contract
        amount:
          type: integer
          description: Amount in whole cents
        info:
          type: string
          nullable: true
          description: Optional description of the contract
        paid:
          type: boolean
        accepted:
          type: boolean
          nullable: true
          description: null = pending, true = accepted, false = declined
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    # Driving test record
    DrivingTest:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier of the driving test
        cid:
          type: string
          description: Player identifier of the test taker
        icid:
          type: string
          description: Player identifier of the instructor
        instructor:
          type: string
          description: Display name of the instructor
        timestamp:
          type: integer
          description: Epoch seconds when the test was recorded
        points:
          type: integer
          description: Numeric score of the test
        passed:
          type: boolean
          description: Whether the student passed the test
        results:
          type: object
          additionalProperties: true
          description: Arbitrary result details encoded as JSON
    Character:
      type: object
      properties:
        id:
          type: integer
        ownerHex:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        dob:
          type: string
          format: date
          nullable: true
        gender:
          type: string
          nullable: true
        phoneNumber:
          type: string
          nullable: true
        story:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    CharacterCreateRequest:
      type: object
      required:
        - first_name
        - last_name
      properties:
        first_name:
          type: string
        last_name:
          type: string
        dob:
          type: string
          format: date
          nullable: true
        gender:
          type: string
          nullable: true
        phone_number:
          type: string
          nullable: true
        story:
          type: string
          nullable: true
    # Weed plant record
    WeedPlant:
      type: object
      properties:
        id:
          type: integer
        coords:
          type: object
          properties:
            x:
              type: number
            y:
              type: number
            z:
              type: number
          required:
            - x
            - y
            - z
        seed:
          type: string
          description: Seed identifier used when planting
        ownerId:
          type: integer
          description: Player identifier who owns the plant
        growth:
          type: integer
          description: Growth percentage or arbitrary unit
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    # Website record
    Website:
      type: object
      properties:
        id:
          type: integer
        owner_id:
          type: integer
          description: Character ID of the website owner
        name:
          type: string
          description: Website title
        keywords:
          type: string
          nullable: true
          description: Space separated keywords for search
        description:
          type: string
          nullable: true
          description: Optional description of the website
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    # Request body for creating a website
    WebsiteCreateRequest:
      type: object
      required:
        - ownerId
        - name
      properties:
        ownerId:
          type: integer
          description: Character ID of the website owner
        name:
          type: string
          description: Website title
        keywords:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    # Asset record
    Asset:
      type: object
      properties:
        id:
          type: integer
        owner_id:
          type: integer
          description: Character ID owning the asset
        url:
          type: string
        type:
          type: string
          description: Asset type or MIME category
        name:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
    # Asset creation request
    AssetCreateRequest:
      type: object
      required:
        - ownerId
        - url
        - type
      properties:
        ownerId:
          type: integer
        url:
          type: string
        type:
          type: string
        name:
          type: string
          nullable: true
    Clothing:
      type: object
      properties:
        id:
          type: integer
        characterId:
          type: integer
        slot:
          type: string
        name:
          type: string
          nullable: true
        data:
          type: object
        createdAt:
          type: string
          format: date-time
    ClothingCreateRequest:
      type: object
      required:
        - characterId
        - slot
        - data
      properties:
        characterId:
          type: integer
        slot:
          type: string
        data:
          type: object
        name:
          type: string
          nullable: true
    # Drift school payment request
    DriftSchoolPayment:
      type: object
      required:
        - playerId
        - amount
      properties:
        playerId:
          type: string
          description: Identifier of the paying player
        amount:
          type: number
          description: Amount in whole cents to pay for drift school
    # Harness response
    VehicleHarness:
      type: object
      properties:
        harness:
          type: integer
          nullable: true
          description: Harness durability; null if not installed or unknown
    # Harness update request
    HarnessUpdateRequest:
      type: object
      required:
        - durability
      properties:
        durability:
          type: integer
          description: New harness durability value
    # Plate change request
    PlateChangeRequest:
      type: object
      required:
        - oldPlate
        - newPlate
      properties:
        oldPlate:
          type: string
          description: Existing license plate number
        newPlate:
          type: string
          description: New license plate number to assign
    # Secondary job record
    SecondaryJob:
      type: object
      properties:
        id:
          type: integer
        playerId:
          type: string
        job:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    # Secondary job create request
    SecondaryJobCreateRequest:
      type: object
      required:
        - playerId
        - job
      properties:
        playerId:
          type: string
          description: Identifier of the character receiving the secondary job
        job:
          type: string
          description: Name of the secondary job to assign
    # Note record
    Note:
      type: object
      properties:
        id:
          type: integer
        text:
          type: string
          description: The contents of the note
        x:
          type: number
          description: X coordinate where the note is placed
        y:
          type: number
          description: Y coordinate where the note is placed
        z:
          type: number
          description: Z coordinate where the note is placed
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    # Player ammunition inventory
    PlayerAmmo:
      type: object
      description: |
        A map of weapon types to ammunition counts for a single player. Each key
        corresponds to a weapon type string (e.g. "WEAPON_PISTOL") and the value
        is the number of rounds of ammunition currently held.
      additionalProperties:
        type: integer
    # Ammo update request
    AmmoUpdateRequest:
      type: object
      required:
        - weaponType
        - ammo
      properties:
        weaponType:
          type: string
          description: Weapon type name (e.g. "WEAPON_PISTOL")
        ammo:
          type: integer
          description: Number of rounds remaining for the weapon type
    # Request body for creating a note
    NoteCreateRequest:
      type: object
      required:
        - text
        - x
        - y
        - z
      properties:
        text:
          type: string
          description: The contents of the note
        x:
          type: number
          description: X coordinate where the note is placed
        y:
          type: number
          description: Y coordinate where the note is placed
        z:
          type: number
          description: Z coordinate where the note is placed
    # Job definition
    Job:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        label:
          type: string
        description:
          type: string
        createdAt:
          type: string
          format: date-time
    JobCreateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        label:
          type: string
        description:
          type: string
    # Job assignment returned when a job is granted
    JobAssignment:
      type: object
      properties:
        characterId:
          type: integer
        jobId:
          type: integer
        grade:
          type: integer
        onDuty:
          type: boolean
        hiredAt:
          type: string
          format: date-time
    Tweet:
      type: object
      properties:
        handle:
          type: string
          maxLength: 64
        message:
          type: string
          maxLength: 280
        time:
          type: integer
          format: int64
    TweetCreateRequest:
      type: object
      required:
        - handle
        - message
      properties:
        handle:
          type: string
          maxLength: 64
        message:
          type: string
          maxLength: 280
        time:
          type: integer
          format: int64
    EvidenceItem:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        description:
          type: string
        location:
          type: string
          nullable: true
        owner:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    EvidenceItemCreateRequest:
      type: object
      required:
        - type
        - description
      properties:
        type:
          type: string
        description:
          type: string
        location:
          type: string
          nullable: true
        owner:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
          nullable: true
    EvidenceItemUpdateRequest:
      type: object
      properties:
        type:
          type: string
        description:
          type: string
        location:
          type: string
          nullable: true
        owner:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
          nullable: true
    EvidenceChainEntry:
      type: object
      properties:
        id:
          type: integer
        evidenceId:
          type: integer
        handlerId:
          type: integer
        action:
          type: string
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    EvidenceChainEntryCreateRequest:
      type: object
      required:
        - handlerId
        - action
      properties:
        handlerId:
          type: integer
        action:
          type: string
        notes:
          type: string
          nullable: true
    DiamondCasinoGame:
      type: object
      properties:
        id:
          type: integer
        gameType:
          type: string
        state:
          type: string
        metadata:
          type: object
        result:
          type: object
        createdAt:
          type: integer
          format: int64
        resolvedAt:
          type: integer
          format: int64
          nullable: true
        bets:
          type: array
          items:
            $ref: '#/components/schemas/DiamondCasinoBet'
    DiamondCasinoGameCreateRequest:
      type: object
      required:
        - gameType
      properties:
        gameType:
          type: string
        metadata:
          type: object
    DiamondCasinoBet:
      type: object
      properties:
        id:
          type: integer
        gameId:
          type: integer
        characterId:
          type: string
        betAmount:
          type: integer
        betData:
          type: object
        result:
          type: object
        payout:
          type: integer
        createdAt:
          type: integer
          format: int64
        resolvedAt:
          type: integer
          format: int64
          nullable: true
    DiamondCasinoBetCreateRequest:
      type: object
      required:
        - characterId
        - amount
      properties:
        characterId:
          type: string
        amount:
          type: integer
        betData:
          type: object
    InteractSoundPlay:
      type: object
      properties:
        id:
          type: integer
        characterId:
          type: string
        sound:
          type: string
        volume:
          type: number
        playedAt:
          type: integer
          format: int64
    InteractSoundPlayCreateRequest:
      type: object
      required:
        - characterId
        - sound
        - volume
      properties:
        characterId:
          type: string
        sound:
          type: string
        volume:
          type: number
        playedAt:
          type: integer
          format: int64
          nullable: true
    WiseAudioTrack:
      type: object
      properties:
        id:
          type: integer
        characterId:
          type: string
        label:
          type: string
        url:
          type: string
        createdAt:
          type: integer
          format: int64
    WiseAudioTrackCreateRequest:
      type: object
      required:
        - characterId
        - label
        - url
      properties:
        characterId:
          type: string
        label:
          type: string
        url:
          type: string
    WiseImportOrder:
      type: object
      properties:
        id:
          type: integer
        characterId:
          type: string
        model:
          type: string
        status:
          type: string
        createdAt:
          type: integer
          format: int64
        updatedAt:
          type: integer
          format: int64
    WiseImportOrderCreateRequest:
      type: object
      required:
        - characterId
        - model
      properties:
        characterId:
          type: string
        model:
          type: string
    ImportPackOrder:
      type: object
      properties:
        id:
          type: integer
        characterId:
          type: string
        package:
          type: string
        price:
          type: number
          format: float
        status:
          type: string
        createdAt:
          type: integer
          format: int64
        expiresAt:
          type: integer
          format: int64
        expiredAt:
          type: integer
          format: int64
          nullable: true
        deliveredAt:
          type: integer
          format: int64
          nullable: true
        canceledAt:
          type: integer
          format: int64
          nullable: true
    ImportPackOrderCreateRequest:
      type: object
      required:
        - characterId
        - package
        - price
      properties:
        characterId:
          type: string
        package:
          type: string
        price:
          type: number
          format: float
    WiseUCProfile:
      type: object
      properties:
        characterId:
          type: string
        alias:
          type: string
        active:
          type: boolean
        createdAt:
          type: integer
          format: int64
        updatedAt:
          type: integer
          format: int64
    WiseUCProfileCreateRequest:
      type: object
      required:
        - characterId
        - alias
      properties:
        characterId:
          type: string
        alias:
          type: string
        active:
          type: boolean

    WiseWheelsSpin:
      type: object
      properties:
        id:
          type: integer
        characterId:
          type: string
        prize:
          type: string
        createdAt:
          type: integer
          format: int64
    WiseWheelsSpinCreateRequest:
      type: object
      required:
        - characterId
        - prize
      properties:
        characterId:
          type: string
        prize:
          type: string
    Door:
      type: object
      properties:
        doorId:
          type: string
        name:
          type: string
          nullable: true
        locked:
          type: boolean
        position:
          type: object
          nullable: true
          additionalProperties: true
        heading:
          type: number
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DoorUpsertRequest:
      type: object
      required:
        - doorId
      properties:
        doorId:
          type: string
        name:
          type: string
          nullable: true
        locked:
          type: boolean
          nullable: true
        position:
          type: object
          nullable: true
          additionalProperties: true
        heading:
          type: number
          nullable: true

    DoorStateUpdateRequest:
      type: object
      required:
        - locked
      properties:
        locked:
          type: boolean
    Zone:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
        data:
          type: object
        createdBy:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          nullable: true
    ZoneCreateRequest:
      type: object
      required:
        - name
        - type
        - data
      properties:
        name:
          type: string
        type:
          type: string
        data:
          type: object
        createdBy:
          type: integer
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
    Apartment:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        location:
          type: object
          nullable: true
        price:
          type: number
          format: float
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true
    ApartmentCreateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        location:
          type: object
          nullable: true
        price:
          type: number
          format: float
    Property:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [APARTMENT, GARAGE, HOTEL_ROOM]
        name:
          type: string
        location:
          type: object
          nullable: true
        price:
          type: number
          format: float
        ownerCharacterId:
          type: integer
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true
    PropertyCreateRequest:
      type: object
      required:
        - type
        - name
      properties:
        type:
          type: string
          enum: [APARTMENT, GARAGE, HOTEL_ROOM]
        name:
          type: string
        location:
          type: object
          nullable: true
        price:
          type: number
          format: float
        ownerCharacterId:
          type: integer
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
    ApartmentResident:
      type: object
      properties:
        id:
          type: integer
        apartmentId:
          type: integer
        characterId:
          type: integer
        assignedAt:
          type: string
          format: date-time
    ApartmentResidentAssignRequest:
      type: object
      required:
        - characterId
      properties:
        characterId:
          type: integer
    Interior:
      type: object
      properties:
        id:
          type: integer
        apartment_id:
          type: integer
        character_id:
          type: integer
        template:
          type: object
          additionalProperties: true
        updated_at:
          type: string
          format: date-time
    InteriorSaveRequest:
      type: object
      required:
        - characterId
        - template
      properties:
        characterId:
          type: integer
        template:
          type: object
          additionalProperties: true
    BankAccount:
      type: object
      properties:
        id:
          type: integer
        character_id:
          type: string
        balance:
          type: integer
    Transaction:
      type: object
      properties:
        id:
          type: integer
        from_character_id:
          type: string
        to_character_id:
          type: string
        amount:
          type: integer
        reason:
          type: string
          nullable: true
    Invoice:
      type: object
      properties:
        id:
          type: integer
        from_character_id:
          type: string
        to_character_id:
          type: string
        amount:
          type: integer
        reason:
          type: string
          nullable: true
        status:
          type: string
        due_at:

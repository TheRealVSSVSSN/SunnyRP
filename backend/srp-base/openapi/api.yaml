  # Contracts API
  /v1/contracts:
    get:
      summary: List contracts for a player
      description: Returns all contracts where the specified player is either the sender or receiver.
      parameters:
        - in: query
          name: playerId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of contracts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Contract'
    post:
      summary: Create a new contract
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - senderId
                - receiverId
                - amount
              properties:
                senderId:
                  type: string
                receiverId:
                  type: string
                amount:
                  type: integer
                  description: Amount in whole cents
                info:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Contract created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer

  /v1/contracts/{id}/accept:
    post:
      summary: Accept a contract
      description: Accepts a pending contract, withdrawing funds from the receiver and depositing into the sender.  Requires the playerId of the receiver in the body.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - playerId
              properties:
                playerId:
                  type: string
      responses:
        '200':
          description: Contract accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer

  /v1/contracts/{id}/decline:
    post:
      summary: Decline a contract
      description: Declines a pending contract without transferring funds.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Contract declined


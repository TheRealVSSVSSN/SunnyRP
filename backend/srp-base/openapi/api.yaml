security:
  - ApiToken: []
paths:
  /v1/healthz:
    get:
      summary: Liveness probe
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                type: object
  /v1/debug/status:
    get:
      summary: Get server diagnostics
      operationId: getDebugStatus
      security:
        - ApiToken: []
      responses:
        '200':
          description: Debug information
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      uptime:
                        type: number
                      memory:
                        type: integer
                      timestamp:
                        type: string
                        format: date-time
                      loadavg:
                        type: array
                        items:
                          type: number
  /v1/debug/logs:
    get:
      summary: List debug logs
      operationId: listDebugLogs
      parameters:
        - in: query
          name: level
          schema:
            type: string
        - in: query
          name: since
          schema:
            type: string
            format: date-time
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: accountId
          schema:
            type: string
        - in: query
          name: characterId
          schema:
            type: integer
      responses:
        '200':
          description: Logs list
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      logs:
                        type: array
                        items:
                          $ref: '#/components/schemas/DebugLog'
                  requestId:
                    type: string
                  traceId:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      summary: Create debug log
      operationId: createDebugLog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DebugLogCreateRequest'
      responses:
        '200':
          description: Log created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      log:
                        $ref: '#/components/schemas/DebugLog'
                  requestId:
                    type: string
                  traceId:
                    type: string
      x-webhook-event: debug.log
  /v1/debug/markers:
    get:
      summary: List active debug markers
      operationId: listDebugMarkers
      parameters:
        - in: query
          name: type
          schema:
            type: string
      responses:
        '200':
          description: Markers list
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      markers:
                        type: array
                        items:
                          $ref: '#/components/schemas/DebugMarker'
                  requestId:
                    type: string
                  traceId:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      summary: Create a debug marker
      operationId: createDebugMarker
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DebugMarkerCreateRequest'
      responses:
        '200':
          description: Marker created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      marker:
                        $ref: '#/components/schemas/DebugMarker'
                  requestId:
                    type: string
                  traceId:
                    type: string
      x-webhook-event: debug.marker.created
  /v1/debug/markers/{id}:
    delete:
      summary: Delete a debug marker
      operationId: deleteDebugMarker
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deletion status
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      deleted:
                        type: boolean
                  requestId:
                    type: string
                  traceId:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
                  requestId:
                    type: string
                  traceId:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/characters/{characterId}/account:
    get:
      summary: Retrieve or create a character bank account
      parameters:
        - in: path
          name: characterId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Bank account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankAccount'
  /v1/characters/{characterId}/account:deposit:
    post:
      summary: Deposit funds into a character account
      parameters:
        - in: path
          name: characterId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: integer
      responses:
        '200':
          description: New balance
          content:
            application/json:
              schema:
                type: object
                properties:
                  balance:
                    type: integer
  /v1/characters/{characterId}/account:withdraw:
    post:
      summary: Withdraw funds from a character account
      parameters:
        - in: path
          name: characterId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: integer
      responses:
        '200':
          description: New balance
          content:
            application/json:
              schema:
                type: object
                properties:
                  balance:
                    type: integer
  /v1/characters/{characterId}/transactions:
    get:
      summary: List recent transactions for a character
      parameters:
        - in: path
          name: characterId
          required: true
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        '200':
          description: List of transactions
          content:
            application/json:
              schema:
                type: object
                properties:
                  transactions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Transaction'
  /v1/transactions:
    post:
      summary: Transfer funds between characters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fromCharacterId
                - toCharacterId
                - amount
              properties:
                fromCharacterId:
                  type: string
                toCharacterId:
                  type: string
                amount:
                  type: integer
                reason:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Transfer recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  senderBalance:
                    type: integer
  /v1/transactions/{id}:
    get:
      summary: Retrieve a transaction
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Transaction record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'

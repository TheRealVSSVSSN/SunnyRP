openapi: 3.0.3
info:
  title: SRP Base (srp-base)
  version: 1.0.0
  description: >
    Base service for SunnyRP. All requests must include X-API-Token and HMAC headers (X-Ts, X-Nonce, X-Sig).
servers:
  - url: http://localhost:3301
paths:
  /v1/health:
    get:
      summary: Liveness check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkHealth'
  /v1/ready:
    get:
      summary: Readiness check (DB/Redis)
      responses:
        '200':
          description: Ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkReady'
        '503':
          description: Dependency down
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Fail'
  /v1/metrics:
    get:
      summary: Prometheus metrics
      responses:
        '200':
          description: Metrics text
          content:
            text/plain:
              schema:
                type: string
  /v1/players/link:
    post:
      summary: Link or upsert player identity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlayerLinkRequest'
      responses:
        '200':
          description: Link result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkPlayerLink'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Fail'
  /v1/permissions/{playerId}:
    get:
      summary: Get permission scopes for a player
      parameters:
        - name: playerId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Scopes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkScopes'
  /v1/permissions/grant:
    post:
      summary: Grant a role to a user (requires admin or admin.permissions)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GrantRoleRequest'
      responses:
        '200':
          description: Granted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkGrantRevoke'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Fail'
  /v1/permissions/revoke:
    post:
      summary: Revoke a role from a user (requires admin or admin.permissions)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevokeRoleRequest'
      responses:
        '200':
          description: Revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkGrantRevoke'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Fail'
  /v1/permissions/cache/refresh:
    post:
      summary: Clear scopes cache (all or one user) (requires admin or admin.permissions)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [actorUserId]
              properties:
                actorUserId: { type: integer }
                userId: { type: integer, nullable: true }
      responses:
        '200':
          description: Refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkRefreshed'
  /v1/admin/ban:
    post:
      summary: Ban or re-ban a user (requires admin or admin.ban)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BanRequest'
      responses:
        '200':
          description: Banned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkBan'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Fail'
  /v1/admin/kick:
    post:
      summary: Record a kick (requires admin or admin.kick)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KickRequest'
      responses:
        '200':
          description: Kicked (recorded)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkKick'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Fail'
  /v1/admin/audit:
    get:
      summary: Read audit log
      parameters:
        - name: userId
          in: query
          required: false
          schema: { type: string }
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 50, minimum: 1, maximum: 200 }
      responses:
        '200':
          description: Audit entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkAudit'
  /v1/config/live:
    get:
      summary: Get live config map
      responses:
        '200':
          description: Config map
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkConfigMap'
    post:
      summary: Set a config key (requires ENABLE_CONFIG_WRITE=true)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigSetRequest'
      responses:
        '200':
          description: Set OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkConfigSet'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Fail'
components:
  schemas:
    EnvelopeOk:
      type: object
      required: [ok, data, requestId, traceId]
      properties:
        ok: { type: boolean, enum: [true] }
        data: { type: object }
        requestId: { type: string }
        traceId: { type: string }
    EnvelopeFail:
      type: object
      required: [ok, error, requestId, traceId]
      properties:
        ok: { type: boolean, enum: [false] }
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            details: { type: object }
        requestId: { type: string }
        traceId: { type: string }
    OkHealth:
      allOf:
        - $ref: '#/components/schemas/EnvelopeOk'
        - type: object
          properties:
            data:
              type: object
              properties:
                status: { type: string, example: ok }
    OkReady:
      allOf:
        - $ref: '#/components/schemas/EnvelopeOk'
        - type: object
          properties:
            data:
              type: object
              properties:
                ready: { type: boolean, example: true }
    OkPlayerLink:
      allOf:
        - $ref: '#/components/schemas/EnvelopeOk'
        - type: object
          properties:
            data:
              type: object
              properties:
                banned: { type: boolean }
                banReason: { type: [string, 'null'] }
                scopes:
                  type: array
                  items: { type: string }
                userId: { type: integer }
    OkScopes:
      allOf:
        - $ref: '#/components/schemas/EnvelopeOk'
        - type: object
          properties:
            data:
              type: object
              properties:
                scopes:
                  type: array
                  items: { type: string }
    OkGrantRevoke:
      allOf:
        - $ref: '#/components/schemas/EnvelopeOk'
        - type: object
          properties:
            data:
              type: object
              properties:
                userId: { type: integer }
                role: { type: string }
                action: { type: string, example: granted }
    OkBan:
      allOf:
        - $ref: '#/components/schemas/EnvelopeOk'
        - type: object
          properties:
            data:
              type: object
              properties:
                userId: { type: integer }
                banned: { type: boolean }
                reason: { type: [string, 'null'] }
    OkKick:
      allOf:
        - $ref: '#/components/schemas/EnvelopeOk'
        - type: object
          properties:
            data:
              type: object
              properties:
                userId: { type: integer }
                kicked: { type: boolean }
                reason: { type: [string, 'null'] }
    OkAudit:
      allOf:
        - $ref: '#/components/schemas/EnvelopeOk'
        - type: object
          properties:
            data:
              type: object
              properties:
                entries:
                  type: array
                  items:
                    type: object
                    properties:
                      id: { type: integer }
                      actor_user_id: { type: [integer, 'null'] }
                      target_user_id: { type: [integer, 'null'] }
                      action: { type: string }
                      meta: { type: object, nullable: true, additionalProperties: true }
                      created_at: { type: string }
    OkConfigMap:
      allOf:
        - $ref: '#/components/schemas/EnvelopeOk'
        - type: object
          properties:
            data:
              type: object
              additionalProperties: true
    OkConfigSet:
      allOf:
        - $ref: '#/components/schemas/EnvelopeOk'
        - type: object
          properties:
            data:
              type: object
              properties:
                key: { type: string }
                value: { type: object }
    OkRefreshed:
      allOf:
        - $ref: '#/components/schemas/EnvelopeOk'
        - type: object
          properties:
            data:
              type: object
              properties:
                refreshed: { type: boolean }
                userId: { type: [integer, 'null'] }
    Fail:
      $ref: '#/components/schemas/EnvelopeFail'
    PlayerLinkRequest:
      type: object
      required: [primary, identifiers]
      properties:
        primary: { type: string, description: license|steam|discord }
        identifiers:
          type: array
          items: { type: string }
        ip: { type: string, example: "127.0.0.1" }
    GrantRoleRequest:
      type: object
      required: [actorUserId, targetUserId, role]
      properties:
        actorUserId: { type: integer }
        targetUserId: { type: integer }
        role: { type: string }
    RevokeRoleRequest:
      type: object
      required: [actorUserId, targetUserId, role]
      properties:
        actorUserId: { type: integer }
        targetUserId: { type: integer }
        role: { type: string }
    BanRequest:
      type: object
      required: [actorUserId]
      properties:
        actorUserId: { type: integer }
        targetUserId: { type: integer, nullable: true }
        primary: { type: string, nullable: true, description: license|steam|discord }
        identifiers:
          type: array
          nullable: true
          items: { type: string }
        reason: { type: string, nullable: true }
        active: { type: boolean, default: true }
    KickRequest:
      type: object
      required: [actorUserId, targetUserId]
      properties:
        actorUserId: { type: integer }
        targetUserId: { type: integer }
        reason: { type: string, nullable: true }
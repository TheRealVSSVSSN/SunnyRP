openapi: 3.0.3
info:
  title: SunnyRP Base API
  version: "1.0.0"
servers:
  - url: http://127.0.0.1:3010
paths:
  /v1/healthz:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvelopeOk' }

  /v1/config/live:
    get:
      summary: Get live config
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvelopeOk' }
    post:
      summary: Update live config (guarded)
      security:
        - ApiToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value: { type: object, additionalProperties: true }
                updated_at: { type: string, format: date-time }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvelopeOk' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvelopeErr' }

  /v1/permissions/{playerId}:
    get:
      summary: Get scopes for a player
      parameters:
        - in: path
          name: playerId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvelopeOk' }

  /v1/users/exists:
    get:
      summary: Check if a user exists by hex_id
      parameters:
        - in: query
          name: hex_id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvelopeOk' }

  /v1/users:
    post:
      summary: Create user (idempotent)
      security:
        - ApiToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hex_id, name]
              properties:
                hex_id: { type: string }
                name: { type: string }
                identifiers:
                  type: array
                  items:
                    type: object
                    required: [type, value]
                    properties:
                      type: { type: string, enum: [license, steam, discord, fivem, xbl, live, ip] }
                      value: { type: string }
      responses:
        '200':
          description: Created or existing
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvelopeOk' }

  /v1/users/{hex_id}:
    get:
      summary: Fetch a user by hex_id
      parameters:
        - in: path
          name: hex_id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvelopeOk' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvelopeErr' }

  /v1/characters:
    get:
      summary: List characters for an owner
      parameters:
        - in: query
          name: owner_hex
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvelopeOk' }
    post:
      summary: Create character (idempotent name + unique phone)
      security:
        - ApiToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [owner_hex, first_name, last_name]
              properties:
                owner_hex: { type: string }
                first_name: { type: string }
                last_name: { type: string }
                dob: { type: string, format: date-time, nullable: true }
                gender: { type: integer, minimum: 0, maximum: 9, nullable: true }
                story: { type: string, nullable: true }
      responses:
        '200':
          description: Created or existing
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvelopeOk' }
        '409':
          description: Duplicate name
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvelopeErr' }
        '412':
          description: Owner missing
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvelopeErr' }

  /v1/characters/{id}:
    delete:
      summary: Delete a character by id
      security:
        - ApiToken: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvelopeOk' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvelopeErr' }

components:
  securitySchemes:
    ApiToken:
      type: apiKey
      in: header
      name: X-API-Token

  schemas:
    EnvelopeOk:
      type: object
      required: [ok, data]
      properties:
        ok: { type: boolean, enum: [true] }
        data: {}
        requestId: { type: string, nullable: true }
        traceId: { type: string, nullable: true }
    EnvelopeErr:
      type: object
      required: [ok, error]
      properties:
        ok: { type: boolean, enum: [false] }
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            details: {}
        requestId: { type: string, nullable: true }
        traceId: { type: string, nullable: true }
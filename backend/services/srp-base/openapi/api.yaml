openapi: 3.0.3
info:
  title: SunnyRP Base API
  version: "1.0.0"
  description: |
    Base microservice for SunnyRP. The backend is authoritative for all persistence.
    Envelope:
      Success: { ok: true, data, requestId, traceId }
      Error:   { ok: false, error:{ code, message, details? }, requestId, traceId }

servers:
  - url: http://localhost:{port}
    variables:
      port:
        default: "3010"

tags:
  - name: Health
  - name: Config
  - name: Identity
  - name: Users
  - name: Permissions
  - name: Characters

components:
  securitySchemes:
    ApiToken:
      type: apiKey
      in: header
      name: X-API-Token
  schemas:
    EnvelopeOk:
      type: object
      required: [ok, data, requestId, traceId]
      properties:
        ok:
          type: boolean
          const: true
        data:
          type: object
        requestId:
          type: string
        traceId:
          type: string
    ErrorObject:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [INVALID_INPUT, UNAUTHENTICATED, FORBIDDEN, NOT_FOUND, CONFLICT, FAILED_PRECONDITION, RATE_LIMITED, INTERNAL_ERROR, DEPENDENCY_DOWN]
        message:
          type: string
        details:
          type: object
    EnvelopeErr:
      type: object
      required: [ok, error, requestId, traceId]
      properties:
        ok:
          type: boolean
          const: false
        error:
          $ref: '#/components/schemas/ErrorObject'
        requestId:
          type: string
        traceId:
          type: string

    Identifier:
      type: object
      properties:
        type:
          type: string
          description: e.g. license, steam, discord
        value:
          type: string

    User:
      type: object
      required: [hex_id, name, rank]
      properties:
        hex_id:
          type: string
        steam_id:
          type: string
          nullable: true
        license:
          type: string
          nullable: true
        discord:
          type: string
          nullable: true
        community_id:
          type: string
          nullable: true
        name:
          type: string
        rank:
          type: string
          description: One of: user, admin, dev, etc.

    Character:
      type: object
      required: [id, owner_hex, first_name, last_name, phone_number]
      properties:
        id:
          type: integer
          format: int64
        owner_hex:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        dob:
          type: string
          nullable: true
          description: ISO date (YYYY-MM-DD)
        gender:
          type: string
          nullable: true
        phone_number:
          type: string
        story:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    UsersExistsResponse:
      type: object
      required: [exists]
      properties:
        exists:
          type: boolean

    LinkPlayerRequest:
      type: object
      required: [playerId, identifiers]
      properties:
        playerId:
          type: integer
        identifiers:
          type: array
          items:
            $ref: '#/components/schemas/Identifier'

    LinkPlayerResponse:
      type: object
      required: [playerId, banned, verified, whitelisted, scopes]
      properties:
        playerId:
          type: integer
        banned:
          type: boolean
        banReason:
          type: string
          nullable: true
        verified:
          type: boolean
        whitelisted:
          type: boolean
        scopes:
          type: array
          items:
            type: string

security:
  - ApiToken: []

paths:
  /v1/healthz:
    get:
      tags: [Health]
      summary: Liveness
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvelopeOk' }

  /v1/config/live:
    get:
      tags: [Config]
      summary: Get live config/features
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvelopeOk' }

  /v1/players/link:
    post:
      tags: [Identity]
      summary: Link a connecting FiveM player by identifiers
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LinkPlayerRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvelopeOk' }
        '4XX':
          description: Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvelopeErr' }

  /v1/permissions/{playerId}:
    get:
      tags: [Permissions]
      summary: Get scopes for player
      parameters:
        - name: playerId
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvelopeOk' }

  /v1/users/exists:
    get:
      tags: [Users]
      summary: Check if a user exists by hex_id
      parameters:
        - name: hex_id
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/EnvelopeOk'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UsersExistsResponse'
        '4XX':
          description: Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvelopeErr' }

  /v1/users:
    post:
      tags: [Users]
      summary: Create user if not exists
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hex_id, name]
              properties:
                hex_id: { type: string }
                name:   { type: string }
                identifiers:
                  type: array
                  items: { $ref: '#/components/schemas/Identifier' }
                rank:
                  type: string
                  default: user
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvelopeOk' }
        '409':
          description: Conflict (already exists if strict)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvelopeErr' }

  /v1/users/{hex_id}:
    get:
      tags: [Users]
      summary: Get user by hex_id
      parameters:
        - name: hex_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvelopeOk' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvelopeErr' }

  /v1/characters:
    get:
      tags: [Characters]
      summary: List characters by owner_hex
      parameters:
        - name: owner_hex
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvelopeOk' }

    post:
      tags: [Characters]
      summary: Create character (atomic: validates unique name & phone)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [owner_hex, first_name, last_name]
              properties:
                owner_hex:  { type: string }
                first_name: { type: string }
                last_name:  { type: string }
                dob:        { type: string, nullable: true, description: ISO date (YYYY-MM-DD) }
                gender:     { type: string, nullable: true }
                story:      { type: string, nullable: true }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvelopeOk' }
        '409':
          description: Conflict (duplicate name/phone)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvelopeErr' }
        '422':
          description: Failed precondition
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvelopeErr' }

  /v1/characters/{id}:
    get:
      tags: [Characters]
      summary: Get character by id
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvelopeOk' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvelopeErr' }

    patch:
      tags: [Characters]
      summary: Update character (optional)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name: { type: string }
                last_name:  { type: string }
                dob:        { type: string, nullable: true }
                gender:     { type: string, nullable: true }
                story:      { type: string, nullable: true }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvelopeOk' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnvelopeErr' }
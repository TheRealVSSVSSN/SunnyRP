openapi: 3.1.0
info:
  title: SunnyRP Base API
  version: "1.0.0"
  description: |
    Core service for SunnyRP: identity link, permissions, config live flags, admin, and delivery outbox.

    ## Envelopes (ALWAYS)
    - **Success**: `{ ok: true, data, requestId, traceId }`
    - **Error**: `{ ok: false, error: { code, message, details? }, requestId, traceId }`

    ## Auth & Replay Protection
    - All requests MUST include `X-API-Token`.
    - If HMAC is enabled, also include `X-Ts`, `X-Nonce`, `X-Sig` where:
      - `X-Sig = hex(hmac_sha256(secret, "method|path|rawBody|ts|nonce"))`
      - `X-Ts` is a UNIX timestamp (seconds or milliseconds; server allows ±90s skew)
      - `X-Nonce` is a UUID; each nonce may only be used once within TTL.

servers:
  - url: http://localhost:3001
    description: Local dev
  - url: https://api.sunnysrv.local
    description: Production (example)

tags:
  - name: health
    description: Liveness & readiness
  - name: identity
    description: Player linking & account resolution
  - name: permissions
    description: RBAC permissions for players
  - name: admin
    description: Administrative actions & audit
  - name: config
    description: Live configuration & feature flags
  - name: outbox
    description: Delivery outbox for cross-service events
  - name: misc
    description: Utility endpoints

security:
  - ApiTokenAuth: []

paths:
  /v1/health:
    get:
      operationId: getHealth
      tags: [health]
      summary: Service liveness probe
      description: Returns basic service status.
      security: []   # no auth
      responses:
        '200':
          description: OK
          headers:
            x-request-id:
              schema: { type: string }
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/EnvelopeOk'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          status: { type: string, example: "ok" }
                          uptimeSec: { type: integer, example: 123 }
                          pid: { type: integer }
                          hostname: { type: string }
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/ready:
    get:
      operationId: getReady
      tags: [health]
      summary: Readiness probe
      description: Returns 200 only when dependencies are reachable.
      security: []   # no auth
      responses:
        '200':
          description: Ready
          headers:
            x-request-id:
              schema: { type: string }
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/EnvelopeOk'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          ready: { type: boolean, example: true }
        '503':
          $ref: '#/components/responses/DependencyDown'

  /v1/metrics:
    get:
      operationId: getMetrics
      tags: [health]
      summary: Prometheus metrics
      description: Exposes Prometheus/`text/plain` metrics if enabled.
      security: []   # no auth
      responses:
        '200':
          description: Prometheus metrics
          content:
            text/plain:
              schema:
                type: string

  /v1/ping:
    get:
      operationId: getPing
      tags: [misc]
      summary: Lightweight ping with timestamp
      responses:
        '200':
          description: OK
          headers:
            x-request-id:
              schema: { type: string }
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/EnvelopeOk'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          service: { type: string, example: "srp-base" }
                          ts: { type: integer }
                          env: { type: string, example: "development" }

  /v1/players/link:
    post:
      operationId: postPlayersLink
      tags: [identity]
      summary: Link or create a player account by identifiers
      description: |
        Idempotent link by any supplied identifiers. If no user exists, one is created.
        Returns ban/verify/whitelist flags and effective scopes.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/HmacTs'
        - $ref: '#/components/parameters/HmacNonce'
        - $ref: '#/components/parameters/HmacSig'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LinkPlayerRequest'
            examples:
              example:
                value:
                  name: "VSSVSSN"
                  primary: "license:abcd1234"
                  identifiers:
                    license: "license:abcd1234"
                    discord: "discord:1234567890"
                    ip: "127.0.0.1"
                  meta:
                    endpoint: "127.0.0.1"
      responses:
        '200':
          description: Linked (existing or new)
          headers:
            x-request-id:
              schema: { type: string }
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/EnvelopeOk'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LinkPlayerResponse'
        '400':
          $ref: '#/components/responses/InvalidInput'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/permissions/{playerId}:
    get:
      operationId: getPermissionsByPlayerId
      tags: [permissions]
      summary: Get effective scopes for a player
      parameters:
        - name: playerId
          in: path
          required: true
          description: Numeric player/user id (srp-base treats playerId === userId)
          schema: { type: integer, minimum: 1 }
      responses:
        '200':
          description: OK
          headers:
            x-request-id:
              schema: { type: string }
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/EnvelopeOk'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          scopes:
                            type: array
                            items: { type: string }
                            example: ["player","admin"]
        '400':
          $ref: '#/components/responses/InvalidInput'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/admin/ban:
    post:
      operationId: postAdminBan
      tags: [admin]
      summary: Ban a user
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/HmacTs'
        - $ref: '#/components/parameters/HmacNonce'
        - $ref: '#/components/parameters/HmacSig'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, reason]
              properties:
                userId: { type: integer, minimum: 1 }
                reason: { type: string }
                durationMinutes:
                  type: integer
                  description: Optional duration; omit for permanent ban
      responses:
        '200':
          description: Banned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeOk'
        '400':
          $ref: '#/components/responses/InvalidInput'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/admin/kick:
    post:
      operationId: postAdminKick
      tags: [admin]
      summary: Kick an online player
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source, reason]
              properties:
                source: { type: integer, description: FXServer source id }
                reason: { type: string }
      responses:
        '200':
          description: Kicked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeOk'
        '400':
          $ref: '#/components/responses/InvalidInput'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/admin/audit:
    get:
      operationId: getAdminAudit
      tags: [admin]
      summary: List recent admin actions
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50, minimum: 1, maximum: 500 }
        - name: cursor
          in: query
          schema: { type: string, description: Opaque pagination cursor }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/EnvelopeOk'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              type: object
                              additionalProperties: true
                          nextCursor: { type: [ 'string', 'null' ] }

  /v1/config/live:
    get:
      operationId: getConfigLive
      tags: [config]
      summary: Get current live config/feature flags
      responses:
        '200':
          description: Current live config
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/EnvelopeOk'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LiveConfig'
    post:
      operationId: postConfigLive
      tags: [config]
      summary: Update live config/feature flags (broadcast to game)
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/HmacTs'
        - $ref: '#/components/parameters/HmacNonce'
        - $ref: '#/components/parameters/HmacSig'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LiveConfig'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeOk'
        '400':
          $ref: '#/components/responses/InvalidInput'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/outbox/enqueue:
    post:
      operationId: postOutboxEnqueue
      tags: [outbox]
      summary: Enqueue an outbox message (for async delivery)
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/HmacTs'
        - $ref: '#/components/parameters/HmacNonce'
        - $ref: '#/components/parameters/HmacSig'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [topic, payload]
              properties:
                topic: { type: string, example: "player.created" }
                payload:
                  type: object
                  additionalProperties: true
                deliverAfterMs:
                  type: integer
                  description: Optional delay (ms)
                dedupeKey:
                  type: string
                  description: Optional dedupe key for idempotent enqueue
      responses:
        '200':
          description: Enqueued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeOk'
        '400':
          $ref: '#/components/responses/InvalidInput'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  securitySchemes:
    ApiTokenAuth:
      type: apiKey
      in: header
      name: X-API-Token
      description: Static service token configured per-service.

  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: |
        Provide to make mutating requests idempotent. The server will not re-apply the same mutation for a previously seen key.
      schema:
        type: string
        maxLength: 128
    HmacTs:
      name: X-Ts
      in: header
      required: false
      description: UNIX timestamp (seconds or ms). Used for HMAC replay guard; ±90s skew permitted.
      schema:
        type: integer
        format: int64
    HmacNonce:
      name: X-Nonce
      in: header
      required: false
      description: Unique nonce (UUID). Only valid once within TTL when HMAC is enabled.
      schema:
        type: string
    HmacSig:
      name: X-Sig
      in: header
      required: false
      description: HMAC-SHA256 signature of `method|path|rawBody|ts|nonce`, hex-encoded.
      schema:
        type: string

  schemas:
    EnvelopeOk:
      type: object
      required: [ok, data]
      properties:
        ok: { type: boolean, const: true }
        data: {}
        requestId: { type: [ 'string', 'null' ] }
        traceId: { type: [ 'string', 'null' ] }

    EnvelopeErr:
      type: object
      required: [ok, error]
      properties:
        ok: { type: boolean, const: false }
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum:
                - INVALID_INPUT
                - UNAUTHENTICATED
                - FORBIDDEN
                - NOT_FOUND
                - CONFLICT
                - FAILED_PRECONDITION
                - RATE_LIMITED
                - INTERNAL_ERROR
                - DEPENDENCY_DOWN
            message: { type: string }
            details:
              type: object
              additionalProperties: true
        requestId: { type: [ 'string', 'null' ] }
        traceId: { type: [ 'string', 'null' ] }

    LinkPlayerRequest:
      type: object
      required: [name, primary, identifiers]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 64
        primary:
          type: string
          description: Primary identifier, e.g. "license:abcdef..."
        identifiers:
          type: object
          description: Map of identifierName -> value (e.g., license, discord, steam, ip)
          additionalProperties: { type: string }
        meta:
          type: object
          additionalProperties: true

    LinkPlayerResponse:
      type: object
      required: [userId, playerId, banned, verified, whitelisted, scopes]
      properties:
        userId: { type: integer, example: 123 }
        playerId: { type: integer, example: 123, description: Same as userId in base }
        banned: { type: boolean, example: false }
        banReason: { type: [ 'string', 'null' ] }
        verified: { type: boolean, example: true }
        whitelisted: { type: boolean, example: true }
        scopes:
          type: array
          items: { type: string }
          example: ["player"]

    LiveConfig:
      type: object
      description: Arbitrary live configuration and feature flags.
      properties:
        features:
          type: object
          additionalProperties:
            type: boolean
          example:
            identity: true
            permissions: true
            admin: true
            outbox: true
        settings:
          type: object
          additionalProperties: true
      additionalProperties: true

  responses:
    InvalidInput:
      description: 400 invalid input
      headers:
        x-request-id:
          schema: { type: string }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/EnvelopeErr' }
          examples:
            example:
              value:
                ok: false
                error:
                  code: INVALID_INPUT
                  message: "Bad request"
                  details:
                    fieldErrors:
                      - { path: "name", message: "Required" }
                requestId: "d49c..."
                traceId: "d49c..."
    Unauthenticated:
      description: 401 unauthenticated
      headers:
        x-request-id:
          schema: { type: string }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/EnvelopeErr' }
          examples:
            example:
              value:
                ok: false
                error: { code: UNAUTHENTICATED, message: "Missing or invalid X-API-Token" }
                requestId: "d49c..."
                traceId: "d49c..."
    Forbidden:
      description: 403 forbidden
      headers:
        x-request-id:
          schema: { type: string }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/EnvelopeErr' }
          examples:
            example:
              value:
                ok: false
                error: { code: FORBIDDEN, message: "Insufficient scope" }
                requestId: "d49c..."
                traceId: "d49c..."
    DependencyDown:
      description: 503 dependency down
      headers:
        x-request-id:
          schema: { type: string }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/EnvelopeErr' }
          examples:
            example:
              value:
                ok: false
                error: { code: DEPENDENCY_DOWN, message: "DB not ready" }
                requestId: "d49c..."
                traceId: "d49c..."
    RateLimited:
      description: 429 rate limited
      headers:
        retry-after:
          schema: { type: integer, description: Seconds to retry }
        x-request-id:
          schema: { type: string }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/EnvelopeErr' }
          examples:
            example:
              value:
                ok: false
                error: { code: RATE_LIMITED, message: "Too many requests" }
                requestId: "d49c..."
                traceId: "d49c..."
    InternalError:
      description: 500 internal error
      headers:
        x-request-id:
          schema: { type: string }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/EnvelopeErr' }
          examples:
            example:
              value:
                ok: false
                error: { code: INTERNAL_ERROR, message: "Unexpected error" }
                requestId: "d49c..."
                traceId: "d49c..."
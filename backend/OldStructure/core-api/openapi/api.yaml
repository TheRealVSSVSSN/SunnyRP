openapi: 3.0.3
info:
  title: Sunny Roleplay Core API
  version: 1.0.0
servers:
  - url: http://localhost:3301
paths:
  /health:
    get:
      summary: Liveness
      responses:
        '200':
          description: OK
  /ready:
    get:
      summary: Readiness (DB + migrations)
      responses:
        '200':
          description: Ready
        '503':
          description: Not Ready
  /metrics:
    get:
      summary: Prometheus metrics
      responses:
        '200':
          description: Metrics text
  /players/link:
    post:
      summary: Upsert user by identifiers and update last_seen_at/IP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                identifiers:
                  type: object
                  additionalProperties: true
                primary:
                  type: string
                  example: license
                ip:
                  type: string
      responses:
        '200':
          description: Linked
  /players/{userId}:
    get:
      summary: Get user with identifiers
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: integer }
      responses: { '200': { description: OK } }
  /permissions/{userId}:
    get:
      summary: Effective permissions (roles, scopes, overrides)
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: integer }
      responses: { '200': { description: OK } }
  /permissions/grant:
    post:
      summary: Grant role or scope to a user
      responses: { '200': { description: OK } }
    delete:
      summary: Revoke role or scope from a user
      responses: { '200': { description: OK } }
  /admin/ban:
    post:
      summary: Ban a user (minutes null for permanent)
      responses: { '200': { description: OK } }
  /admin/kick:
    post:
      summary: Record a kick audit (FiveM kicks separately)
      responses: { '200': { description: OK } }
  /admin/audit:
    get:
      summary: Fetch audit log
      responses: { '200': { description: OK } }
  /characters:
    get:
      summary: List characters for a user
      parameters:
        - in: query
          name: userId
          required: true
          schema: { type: integer }
      responses: { '200': { description: OK } }
    post:
      summary: Create character
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId: { type: integer }
                first_name: { type: string }
                last_name: { type: string }
                dob: { type: string, format: date }
                gender: { type: string }
      responses: { '200': { description: Created } }
  /characters/select:
    post:
      summary: Select character and return canonical state
      responses: { '200': { description: OK } }
  /characters/{id}:
    delete:
      summary: Soft delete character
      parameters: [ { in: path, name: id, required: true, schema: { type: integer } } ]
      responses: { '200': { description: OK } }
  /characters/state/position:
    post:
      summary: Save current position for a character
      responses: { '200': { description: OK } }
  /map/position:
    post:
      summary: Telemetry — store latest character position (opt-in)
      description: Updates character_state.position (and routing_bucket, if provided). Enabled by server opt-in.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId: { type: integer }
                characterId: { type: integer }
                position:
                  type: object
                  properties:
                    x: { type: number } y: { type: number } z: { type: number } heading: { type: number }
                routing_bucket: { type: integer, nullable: true }
                speed: { type: number, nullable: true }
                ts: { type: string, format: date-time, nullable: true }
      responses:
        '200': { description: OK }
  /chat/log:
    post:
      summary: Append a chat message (server-authoritative)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId: { type: integer }
                characterId: { type: integer, nullable: true }
                channel: { type: string, enum: [local, me, do, ooc, staff] }
                message: { type: string }
                position:
                  type: object
                  properties: { x: {type:number}, y: {type:number}, z: {type:number}, heading: {type:number} }
                routing_bucket: { type: integer, nullable: true }
                src: { type: integer, nullable: true }
      responses:
        '200': { description: OK }
  /chat/history:
    get:
      summary: Recent chat for a character
      parameters:
        - in: query; name: charId; required: true; schema: { type: integer }
        - in: query; name: limit; schema: { type: integer, default: 50, maximum: 200 }
      responses:
        '200': { description: OK }
  /status/{charId}:
    get:
      summary: Get character status
      parameters:
        - in: path
          name: charId
          required: true
          schema: { type: integer }
      responses:
        '200': { description: OK }
  /status/{charId}/patch:
    post:
      summary: Patch character status (absolute values and/or deltas)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                values:
                  type: object
                  additionalProperties: { type: number }
                deltas:
                  type: object
                  additionalProperties: { type: number }
      responses:
        '200': { description: OK }
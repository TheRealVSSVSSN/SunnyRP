<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SRP Admin</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div id="wrap" class="wrap" style="display:none">
        <div class="topbar">
            <h2>SunnyRP — Admin</h2>
            <button id="close">✕</button>
        </div>

        <div class="grid">
            <div class="panel">
                <div class="row">
                    <input id="search" placeholder="Search players..." />
                    <button id="refresh">Refresh</button>
                </div>
                <div id="players" class="list"></div>
            </div>

            <div class="panel">
                <h3>Actions</h3>
                <div class="row"><button data-action="spectate">Spectate</button><button
                        data-action="noclip">Noclip</button></div>
                <div class="row"><button data-action="goto">Goto</button><button data-action="bring">Bring</button>
                </div>
                <div class="row">
                    <input id="reason" placeholder="Reason (kick/ban)" />
                    <button data-action="kick">Kick</button>
                    <button data-action="ban">Ban</button>
                </div>
                <div class="row">
                    <input id="radius" type="number" value="120" min="20" step="10" />
                    <button data-action="cleanup">Cleanup</button>
                </div>
                <div id="status" class="status"></div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>

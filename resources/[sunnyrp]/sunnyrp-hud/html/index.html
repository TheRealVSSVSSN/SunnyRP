<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SRP HUD</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div id="hud" class="hud">

        <!-- Vitals -->
        <div id="grp-vitals" class="grp">
            <div class="row">
                <div class="bar vit health">
                    <div class="icon">❤</div>
                    <div class="fill" id="bar-health"></div>
                    <div class="label" id="lbl-health">100</div>
                </div>
                <div class="bar vit armor">
                    <div class="icon">🛡</div>
                    <div class="fill" id="bar-armor"></div>
                    <div class="label" id="lbl-armor">0</div>
                </div>
            </div>
        </div>

        <!-- Status -->
        <div id="grp-status" class="grp">
            <div class="row">
                <div class="bar stat hunger">
                    <div class="icon">🍗</div>
                    <div class="fill" id="bar-hunger"></div>
                    <div class="label" id="lbl-hunger">100</div>
                </div>
                <div class="bar stat thirst">
                    <div class="icon">💧</div>
                    <div class="fill" id="bar-thirst"></div>
                    <div class="label" id="lbl-thirst">100</div>
                </div>
                <div class="bar stat stress">
                    <div class="icon">⚡</div>
                    <div class="fill" id="bar-stress"></div>
                    <div class="label" id="lbl-stress">0</div>
                </div>
            </div>
            <div class="row">
                <div class="bar stat temp">
                    <div class="icon">🌡</div>
                    <div class="fill" id="bar-temp"></div>
                    <div class="label" id="lbl-temp">50</div>
                </div>
                <div class="bar stat wet">
                    <div class="icon">☔</div>
                    <div class="fill" id="bar-wet"></div>
                    <div class="label" id="lbl-wet">0</div>
                </div>
                <div class="chip-row">
                    <div class="chip" id="chip-hot">HOT</div>
                    <div class="chip" id="chip-cold">COLD</div>
                    <div class="chip" id="chip-wet">WET</div>
                    <div class="chip" id="chip-dry">DRY</div>
                    <div class="chip" id="chip-high">HIGH</div>
                    <div class="chip" id="chip-drunk">DRUNK</div>
                </div>
            </div>
        </div>

        <!-- Identity -->
        <div id="grp-identity" class="grp">
            <div class="row identity">
                <div class="field"><span>Cash</span><strong id="id-cash">$0</strong></div>
                <div class="field"><span>Bank</span><strong id="id-bank">$0</strong></div>
                <div class="field"><span>Job</span><strong id="id-job">Unemployed</strong></div>
                <div class="field"><span>Duty</span><strong id="id-duty">Off</strong></div>
            </div>
        </div>

        <!-- Voice -->
        <div id="grp-voice" class="grp">
            <div class="voice">
                <div class="mic" id="voice-mic"></div>
                <div class="mode" id="voice-mode">N</div>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>

</html>

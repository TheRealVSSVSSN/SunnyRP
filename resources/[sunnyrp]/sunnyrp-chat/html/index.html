<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SRP Chat</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <script src="app.js"></script>

<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SRP MDT</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div id="wrap" style="display:none">
        <div class="top">
            <h3>MDT — Reports</h3><button id="close">✕</button>
        </div>
        <div class="row">
            <select id="type">
                <option value="">All</option>
                <option>incident</option>
                <option>citation</option>
                <option>arrest</option>
                <option>warrant</option>
                <option>ems</option>
            </select>
            <button id="refresh">Refresh</button>
        </div>
        <div id="list"></div>
        <hr />
        <div class="row"><input id="title" placeholder="Title" style="flex:1" /></div>
        <div class="row"><textarea id="body" placeholder="Body" rows="6" style="width:100%"></textarea></div>
        <div class="row"><select id="rtype">
                <option>incident</option>
                <option>citation</option>
                <option>arrest</option>
                <option>warrant</option>
                <option>ems</option>
            </select><button id="create">Create</button></div>
    </div>
    <script src="app.js"></script>
</body>

</html>
